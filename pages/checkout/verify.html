<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying Payment — Supamart</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;
             min-height:100vh;background:var(--gray-50)">

  <div style="background:white;padding:48px 40px;border-radius:20px;
              box-shadow:var(--shadow-lg);text-align:center;
              max-width:420px;width:100%">

    <div id="verifyContent">
      <div class="spinner" style="width:48px;height:48px;
                                   border:4px solid var(--gray-200);
                                   border-top-color:var(--primary);
                                   border-radius:50%;
                                   animation:spin 0.8s linear infinite;
                                   margin:0 auto 20px">
      </div>
      <h2 style="font-size:20px;font-weight:800;color:var(--gray-900);
                 margin-bottom:8px">
        Verifying Payment...
      </h2>
      <p style="color:var(--gray-500);font-size:14px">
        Please wait while we confirm your payment
      </p>
    </div>

  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/pages/checkout/verify.js"></script>

</body>
</html>
