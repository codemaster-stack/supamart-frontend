<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cart — Supamart</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
  <link rel="stylesheet" href="/pages/cart/cart.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/pages/home/index.html" class="navbar-logo">
        Supa<span>mart</span>
      </a>
      <ul class="navbar-links">
        <li><a href="/pages/home/index.html">← Continue Shopping</a></li>
      </ul>
      <div class="currency-switcher">
        <select id="currencySelect" onchange="switchCurrency(this.value)">
          <option value="NGN">₦ NGN</option>
          <option value="USD">$ USD</option>
          <option value="GBP">£ GBP</option>
          <option value="EUR">€ EUR</option>
        </select>
      </div>
    </div>
  </nav>

  <main class="cart-main container">

    <div class="cart-layout">

      <!-- Left: Cart Items -->
      <div class="cart-items-section">
        <div class="cart-header">
          <h1>My Cart</h1>
          <span id="cartItemCount" class="cart-count-badge"></span>
        </div>

        <div id="cartItemsList">
          <div class="cart-loading">Loading cart...</div>
        </div>

      </div>

      <!-- Right: Order Summary -->
      <div class="cart-summary-section">
        <div class="cart-summary-card">

          <h2>Order Summary</h2>

          <div class="summary-lines" id="summaryLines"></div>

          <div class="summary-total">
            <span>Total</span>
            <span id="cartTotal">—</span>
          </div>

          <div class="escrow-badge">
            🔒 All payments escrow protected
          </div>

          <button
            class="btn btn-primary btn-full"
            id="checkoutBtn"
            onclick="proceedToCheckout()"
          >
            Proceed to Checkout →
          </button>

          <button
            class="btn btn-outline btn-full"
            style="margin-top:10px"
            onclick="clearCartConfirm()"
          >
            🗑 Clear Cart
          </button>

        </div>
      </div>

    </div>

    <!-- Empty Cart -->
    <div class="empty-cart" id="emptyCart" style="display:none">
      <div class="empty-icon">🛒</div>
      <h2>Your cart is empty</h2>
      <p>Add products from the marketplace to get started</p>
      <a href="/pages/home/index.html" class="btn btn-primary"
         style="margin-top:20px">
        Browse Products →
      </a>
    </div>

  </main>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/cart.js"></script>
  <script src="/pages/cart/cart.js"></script>

</body>
</html>
