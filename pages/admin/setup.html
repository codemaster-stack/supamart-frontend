<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Setup — Supamart</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;
             min-height:100vh;background:var(--gray-50)">

  <div style="background:white;padding:40px;border-radius:16px;
              box-shadow:var(--shadow-lg);width:100%;max-width:420px">

    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:22px;font-weight:800;color:var(--primary)">
        Supa<span style="color:var(--secondary)">mart</span>
      </div>
      <h2 style="font-size:22px;font-weight:800;margin-top:12px">
        Create Admin Account
      </h2>
      <p style="color:var(--gray-500);font-size:14px;margin-top:6px">
        One-time setup. Delete this page after use.
      </p>
    </div>

    <div class="alert alert-error" id="alertBox"></div>
    <div class="alert alert-success" id="successBox"></div>

    <form id="adminForm">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Admin Name" required/>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@supamart.com" required/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required/>
      </div>

      <div class="form-group">
        <label>Setup Key</label>
        <input type="password" id="setupKey" placeholder="Enter setup key" required/>
        <small style="color:var(--gray-400);font-size:12px">
          Contact system owner for setup key
        </small>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
        Create Admin Account
      </button>

    </form>

    <div style="text-align:center;margin-top:20px">
      <a href="/pages/auth/login.html"
         style="color:var(--gray-400);font-size:13px">
        Already have an account? Sign in
      </a>
    </div>

  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/pages/admin/setup.js"></script>

</body>
</html>
