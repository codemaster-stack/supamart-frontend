<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product — Supamart</title>
  <link rel="stylesheet" href="../../assets/css/global.css"/>
  <link rel="stylesheet" href="product.css"/>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="../home/index.html" class="navbar-logo">Supa<span>mart</span></a>
      <ul class="navbar-links">
        <li><a href="/pages/home/index.html">← Back to Home</a></li>
        <li id="navLogin"><a href="../auth/login.html">Sign In</a></li>
        <li id="navLogout" style="display:none">
          <a href="#" onclick="logout()">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Page Loader -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-spinner"></div>
  </div>

  <!-- Product Detail -->
  <main class="product-main container" id="productMain" style="display:none">

    <div class="product-layout">

      <!-- Left: Images -->
      <div class="product-images">
        <div class="main-image-wrapper">
          <img id="mainImage" src="" alt="" class="main-image"/>
          <div class="main-image-placeholder" id="mainImagePlaceholder">📦</div>
        </div>
        <div class="image-thumbnails" id="imageThumbnails"></div>
      </div>

      <!-- Right: Info -->
      <div class="product-details">

        <div class="product-store-badge" id="storeBadge">
          <img id="storeLogoImg" src="" alt="" class="store-logo"/>
          <div>
            <div class="store-label">Sold by</div>
            <a id="storeNameLink" href="#" class="store-name-link"></a>
          </div>
        </div>

        <h1 class="product-title" id="productTitle"></h1>

        <div class="product-price-block">
          <div class="current-price" id="currentPrice"></div>
          <div class="currency-switcher-inline">
            <select id="currencySelect" onchange="switchCurrency(this.value)">
              <option value="NGN">₦ NGN</option>
              <option value="USD">$ USD</option>
              <option value="GBP">£ GBP</option>
              <option value="EUR">€ EUR</option>
            </select>
          </div>
        </div>

        <div class="product-description" id="productDescription"></div>

        <div class="product-meta" id="productMeta"></div>

        <!-- Action Buttons -->
        <div class="product-action-buttons">
          <button
            class="btn btn-primary btn-full"
            id="buyBtn"
            onclick="goToCheckout()"
          >
            🛒 Buy Now — Escrow Protected
          </button>
          <button
            class="btn btn-whatsapp btn-full"
            id="whatsappBtn"
            onclick="contactSeller()"
          >
            💬 Contact Seller on WhatsApp
          </button>
        </div>

        <!-- Escrow Info -->
        <div class="escrow-info">
          <div class="escrow-item">🔒 <span>Payment held in escrow until delivery</span></div>
          <div class="escrow-item">✅ <span>Funds released only after you confirm receipt</span></div>
          <div class="escrow-item">🔄 <span>Dispute protection available</span></div>
        </div>

      </div>
    </div>

  </main>

  <!-- Error State -->
  <div class="error-state container" id="errorState" style="display:none">
    <div class="empty-icon">😕</div>
    <h3>Product not found</h3>
    <p>This product may have been removed or doesn't exist</p>
    <a href="../home/index.html" class="btn btn-primary" style="margin-top:16px">
      Back to Home
    </a>
  </div>

  <script src="../../assets/js/api
