<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verifying Wallet Funding — Supamart</title>
  <link rel="stylesheet" href="/assets/css/global.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;
             min-height:100vh;background:var(--gray-50)">

  <div style="background:white;padding:48px 40px;
              border-radius:20px;box-shadow:var(--shadow-lg);
              text-align:center;max-width:420px;width:100%">

    <div id="verifyContent">
      <div style="width:48px;height:48px;border:4px solid var(--gray-200);
                  border-top-color:var(--primary);border-radius:50%;
                  animation:spin 0.8s linear infinite;margin:0 auto 20px">
      </div>
      <h2 style="font-size:20px;font-weight:800;margin-bottom:8px">
        Verifying Payment...
      </h2>
      <p style="color:var(--gray-500);font-size:14px">
        Please wait while we confirm your wallet funding
      </p>
    </div>

  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const reference = params.get('reference');
      const container = document.getElementById('verifyContent');

      if (!reference) {
        container.innerHTML = `
          <div style="font-size:48px;margin-bottom:16px">❌</div>
          <h2>No reference found</h2>
          <a href="/pages/buyer/dashboard.html"
             class="btn btn-primary" style="margin-top:16px">
            Back to Dashboard
          </a>
        `;
        return;
      }

      try {
        const data = await apiRequest(
          '/wallets/fund-verify', 'POST', { reference }
        );

        container.innerHTML = `
          <div style="font-size:64px;margin-bottom:16px">💰</div>
          <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">
            Wallet Funded!
          </h2>
          <p style="color:var(--gray-500);font-size:14px;margin-bottom:20px">
            ${data.message}
          </p>
          <div style="background:var(--primary-light);padding:16px;
                      border-radius:12px;margin-bottom:24px">
            <div style="font-size:13px;color:var(--gray-500)">
              New Balance
            </div>
            <div style="font-size:28px;font-weight:800;color:var(--primary)">
              ${data.currency} ${data.newBalance?.toFixed(2)}
            </div>
          </div>
          <a href="/pages/buyer/dashboard.html"
             class="btn btn-primary btn-full">
            Go to Dashboard →
          </a>
        `;

      } catch (error) {
        container.innerHTML = `
          <div style="font-size:48px;margin-bottom:16px">❌</div>
          <h2 style="font-size:20px;font-weight:800;margin-bottom:8px">
            Verification Failed
          </h2>
          <p style="color:var(--danger);font-size:14px;margin-bottom:20px">
            ${error.message}
          </p>
          <a href="/pages/buyer/dashboard.html"
             class="btn btn-outline btn-full">
            Back to Dashboard
          </a>
        `;
      }
    })();
  </script>

</body>
</html>
