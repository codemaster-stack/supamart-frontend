<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Supamart</title>
  <link rel="stylesheet" href="../../assets/css/global.css"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <div class="auth-wrapper">

    <!-- Left Panel -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-logo">Supa<span>mart</span></div>
        <p class="brand-tagline">Africa's smartest marketplace</p>
      </div>
      <div class="auth-illustration">
        <div class="float-card card-1">🛍️ Shop Anything</div>
        <div class="float-card card-2">💰 Sell Globally</div>
        <div class="float-card card-3">🔒 Escrow Protected</div>
        <div class="float-card card-4">💱 Multi-Currency</div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-box">

        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to your Supamart account</p>
        </div>

        <div class="alert alert-error" id="alertBox"></div>

        <form id="loginForm">

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required/>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" placeholder="Enter your password" required/>
              <button type="button" class="toggle-password" onclick="togglePassword('password')">👁</button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
            Sign In
          </button>

        </form>

        <div class="auth-footer">
          Don't have an account?
          <a href="register.html">Create one</a>
        </div>

      </div>
    </div>

  </div>

  <script src="../../assets/js/api.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="login.js"></script>

</body>
</html>
